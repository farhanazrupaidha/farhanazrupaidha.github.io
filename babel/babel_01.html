<div id = "wrapper">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/processing.js/1.6.0/processing.min.js"></script>
  <script type="application/processing">

    float theta;
    int value;
    
    void setup () {
      background (0);
      size (window.innerWidth, window.innerHeight);
    }
    
    void draw () {
      translate (width/2, height/1.5);
      lights ();
      noFill ();
      rotate (theta);
      
      rotateX (mouseX + 1.0);
      rotateY (frameCount * 2.0);
      rotateZ (mouseY);
      
      stroke (value);
      rect (70, 50, 100, 30, 20, 100, -mouseX, 50);
      stroke (70);
      curve (-50+mouseY, 150, -50, 300, 50, -mouseX, 100, 60);
      
      //translate (width/2,height/2);
      stroke (200);
     rect (200, mouseX, 180, 40, 20, 200, -70, 50);
     
     stroke (250, 8, 0);
     ellipse (100, mouseX, -mouseX, 60);
     
     stroke (147, 5, 20);
     ellipse (-mouseY, -50 + 1.0, 100, mouseX);
     
     stroke (44, 0 ,5);
     box (-mouseX, - 150, 1.0 + 100);
     
      if (mousePressed == true) {
        background (0);
      }
    }
    
    void mousePressed () {
       stroke (value); 
      color f = color (85, 2, 2);
      color m = color (255, 10, 10);
       if (value == m) {
         value = f;
          } else {
             value = m;
           }
    }
    
    void mouseDragged () {
     background (value); 
      color w = color (255);
      color q = color (237, 2, 2);
       if (value == q) {
         value = w;
          } else {
             value = q;
           }
    }
	
  </script>
